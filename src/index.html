<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMT Production Monitor</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1{
    color:#0078d4;
    text-align:center;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.time{
    color:#666;
    font-size:14px;
}

.model{
    font-size:18px;
    font-weight:bold;
}

.qty{
    color:green;
    font-size:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>📋 SMT Production Monitor</h1>

<div class="card">
    <div class="time">18/07/2026 10:45</div>
    <div class="model">CY-840-0603</div>
    <div class="qty">3000</div>
</div>

<div class="card">
    <div class="time">18/07/2026 10:30</div>
    <div class="model">EY-021-0603</div>
    <div class="qty">1500</div>
</div>

<div class="card">
    <div class="time">18/07/2026 10:15</div>
    <div class="model">CY-841-0603</div>
    <div class="qty">2500</div>
</div>

</body>
</html>
